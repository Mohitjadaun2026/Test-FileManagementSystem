server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/file_load_mgmt?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Mohit@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    # Base64-encoded 32+ byte key. Replace with secure value in real environments.
    secret: ${JWT_SECRET:QmFzZTY0RW5jb2RlZFNlY3JldEtleUZvckRldk9ubHktUmVwbGFjZUluUHJvZA==}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:120}


