<div class="search-bar-wrap">

  <!-- Always-visible compact quick-search row -->
  <form [formGroup]="form" (ngSubmit)="submit()" class="search-bar">

    <mat-form-field appearance="outline" class="f-search">
      <mat-label>Search</mat-label>
      <input matInput formControlName="q" placeholder="filename…" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="f-status">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="">Any</mat-option>
        <mat-option value="PENDING">Pending</mat-option>
        <mat-option value="PROCESSING">Processing</mat-option>
        <mat-option value="COMPLETED">Completed</mat-option>
        <mat-option value="FAILED">Failed</mat-option>
        <mat-option value="ARCHIVED">Archived</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="f-mime">
      <mat-label>Type</mat-label>
      <input matInput formControlName="mimeType" placeholder="e.g. csv" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="f-date">
      <mat-label>From</mat-label>
      <input matInput [matDatepicker]="df" formControlName="dateFrom">
      <mat-datepicker-toggle matSuffix [for]="df"></mat-datepicker-toggle>
      <mat-datepicker #df></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="f-date">
      <mat-label>To</mat-label>
      <input matInput [matDatepicker]="dt" formControlName="dateTo">
      <mat-datepicker-toggle matSuffix [for]="dt"></mat-datepicker-toggle>
      <mat-datepicker #dt></mat-datepicker>
    </mat-form-field>

    <button mat-raised-button type="submit" class="btn-filter">Filter</button>
    <button mat-stroked-button type="button" class="btn-reset" (click)="reset()">Reset</button>

  </form>

</div>
