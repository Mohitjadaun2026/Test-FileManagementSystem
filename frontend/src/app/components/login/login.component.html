<mat-card class="auth-card">
    <div class="form-container">
        <h2>Login</h2>
        <form [formGroup]="form" (ngSubmit)="submit()">
            <mat-form-field appearance="outline" class="full">
                <mat-label>Username or Email</mat-label>
                <input matInput formControlName="login" />
                <mat-error *ngIf="form.controls.login.invalid">Username or email is required</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="full">
                <mat-label>Password</mat-label>
                <input matInput type="password" formControlName="password" />
                <mat-error *ngIf="form.controls.password.invalid">Min length 6</mat-error>
            </mat-form-field>

            <div class="forgot-password-link">
                <a routerLink="/forgot-password">Forgot password?</a>
            </div>

            <button mat-raised-button color="primary" type="submit" class="sign-in-btn" [disabled]="loading || form.invalid">
                {{ loading ? 'Signing in…' : 'Sign in' }}
            </button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <button type="button" class="google-btn" (click)="loginWithGoogle()" [disabled]="oauthLoading">
            <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                <path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#4285F4" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#FBBC05" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span class="google-text">{{ oauthLoading ? 'Redirecting to Google…' : 'Continue with Google' }}</span>
        </button>

        <p class="register-link">Don't have an account? <a routerLink="/register">Sign up</a></p>
    </div>
</mat-card>
