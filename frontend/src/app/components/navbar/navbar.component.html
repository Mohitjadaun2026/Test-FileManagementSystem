<mat-toolbar color="primary" class="navbar">
    <a routerLink="/" class="brand" aria-label="Dashboard">
        <img src="assets/mphasis-logo.png" class="logo" alt="FileLoad logo">
    </a>

    <!-- Dashboard button only visible after login -->
    <button mat-button *ngIf="isLoggedIn" routerLink="/">Dashboard</button>

    <span class="spacer"></span>

    <!-- Login/Register visible only when NOT logged in -->
    <ng-container *ngIf="!isLoggedIn">
        <button mat-button routerLink="/login">Login</button>
        <button mat-button routerLink="/register">Register</button>
    </ng-container>

    <!-- Logged in actions -->
    <ng-container *ngIf="isLoggedIn">
        <button mat-button routerLink="/files">Files</button>
        <button mat-button routerLink="/upload">Upload</button>

        <!-- Profile Menu in Right Corner -->
        <button mat-icon-button [matMenuTriggerFor]="profileMenu" class="profile-menu-btn">
            <img [src]="profileImage" alt="Profile" class="profile-avatar">
        </button>
        <mat-menu #profileMenu="matMenu" panelClass="profile-dropdown-panel" yPosition="below" xPosition="before">
            <div class="profile-menu-card">
                <img [src]="profileImage" alt="Profile" class="profile-avatar-menu">
                <p class="username">{{ currentUser?.name || currentUser?.username || 'User' }}</p>
                <p class="email">{{ currentUser?.email }}</p>
            </div>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="goToProfile()">
                <mat-icon>account_circle</mat-icon>
                <span>View Profile</span>
            </button>
            <button mat-menu-item (click)="logout()">
                <mat-icon>logout</mat-icon>
                <span>Logout</span>
            </button>
        </mat-menu>
    </ng-container>
</mat-toolbar>
