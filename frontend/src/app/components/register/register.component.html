<mat-card class="auth-card">
    <h2>Create Account</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" />
            <mat-error *ngIf="form.controls.email.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="form.controls.email.hasError('email') || form.controls.email.hasError('pattern')">
                Email must be valid (example: mohit&#64;gmail.com)
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
            <mat-label>Password</mat-label>
            <input matInput type="password" formControlName="password" />
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="loading || form.invalid">
            {{ loading ? 'Creating…' : 'Register' }}
        </button>
        <a routerLink="/login" class="ml">I have an account</a>
    </form>
</mat-card>
