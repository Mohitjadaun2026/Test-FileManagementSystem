<div class="profile-dialog">

    <!-- Header -->
    <div class="header">
        <img [src]="profileImage" class="avatar" alt="Profile" (error)="handleProfileImageError()">
        <h3>{{ currentUser?.name || currentUser?.username || 'User' }}</h3>
        <p>{{ currentUser?.email }}</p>
        <span class="role-pill" *ngIf="currentUser?.role" [class.super-admin]="(currentUser?.role || '').toUpperCase() === 'SUPER_ADMIN'">
            {{ getRoleLabel(currentUser?.role) }}
        </span>
    </div>

    <!-- Actions -->
    <div class="menu">
        <button mat-button (click)="goToProfile()">
            <mat-icon>account_circle</mat-icon>
            View Profile
        </button>

        <button mat-button (click)="logout()">
            <mat-icon>logout</mat-icon>
            Logout
        </button>
    </div>

</div>
